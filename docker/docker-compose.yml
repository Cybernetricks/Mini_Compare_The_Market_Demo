services:

  postgres:

    image: postgres:17

    container_name: compare-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: compare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
    
  backend:

    build:
      context: ..
      dockerfile: Dockerfile

    container_name: compare-backend

    ports:
      - "8080:8080"

    depends_on:
      - postgres
  
  frontend:

    build:
      context: ../compare_frontend
      dockerfile: Dockerfile

    container_name: compare-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres-data: